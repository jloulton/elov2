<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morton Name Sorting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bone: #f6f1e6;
    --paper: #ede4d0;
    --paper-deep: #ddd1b6;
    --moss: #6b7d4a;
    --moss-deep: #4d5d36;
    --moss-dark: #2f3a20;
    --sage: #9aab7d;
    --sage-pale: #c5d0a8;
    --fern: #5a7a4f;
    --rosehip: #8a4a3c;
    --rosehip-deep: #6b3729;
    --amber: #b8893d;
    --soil: #4a3a2a;
    --soil-deep: #2c2218;
    --bark: #6b5340;
    --ink: #1f1810;
    --gold-leaf: #a88846;
    --vellum: #f9f3e3;
    --shadow: rgba(44, 34, 24, 0.15);
    --shadow-deep: rgba(44, 34, 24, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background: var(--bone);
    background-image:
      radial-gradient(ellipse at top left, rgba(154, 171, 125, 0.15), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(184, 137, 61, 0.08), transparent 55%),
      radial-gradient(circle at 30% 70%, rgba(107, 125, 74, 0.06), transparent 50%);
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(74, 58, 42, 0.04) 1px, transparent 0),
      radial-gradient(circle at 3px 3px, rgba(74, 58, 42, 0.025) 1px, transparent 0);
    background-size: 4px 4px, 7px 7px;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
  }

  /* Botanical SVG decorations on the page edges */
  .botanical-corner {
    position: fixed;
    width: 220px;
    height: 220px;
    pointer-events: none;
    z-index: 2;
    opacity: 0.55;
  }

  .botanical-corner.tl { top: -20px; left: -20px; }
  .botanical-corner.br { bottom: -20px; right: -20px; transform: rotate(180deg); }

  .app {
    position: relative;
    z-index: 5;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    min-height: 100vh;
  }

  /* Header */
  .masthead {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--paper-deep);
    position: relative;
  }

  .masthead::after {
    content: '❦';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    color: var(--moss);
    background: var(--bone);
    padding: 0 14px;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--bark);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--moss-dark);
  }

  .masthead h1 em {
    font-style: italic;
    color: var(--rosehip);
    font-weight: 400;
  }

  .masthead .latin {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--bark);
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  /* Stat strip */
  .stats {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--soil);
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .stat .num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--moss-dark);
    letter-spacing: 0;
  }

  .stat-divider {
    width: 6px;
    height: 6px;
    background: var(--sage);
    border-radius: 50%;
  }

  /* Match arena */
  .arena {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: start;
    margin-bottom: 32px;
  }

  .arena-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: stretch;
  }

  .btn-eliminate {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 10px 16px;
    background: transparent;
    color: var(--rosehip-deep);
    border: 1px dashed var(--rosehip);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    align-self: center;
    border-radius: 0;
  }

  .btn-eliminate:hover {
    background: var(--rosehip);
    color: var(--vellum);
    border-style: solid;
    border-color: var(--rosehip-deep);
  }

  .btn-eliminate:active {
    background: var(--rosehip-deep);
  }

  .specimen {
    background: var(--vellum);
    border: 1px solid var(--paper-deep);
    padding: 36px 28px 32px;
    position: relative;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
    box-shadow:
      0 1px 0 var(--paper-deep),
      0 6px 12px var(--shadow);
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 240px;
  }

  .specimen::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--paper-deep);
    pointer-events: none;
    transition: border-color 0.25s ease;
  }

  .specimen:hover {
    transform: translateY(-3px);
    box-shadow:
      0 1px 0 var(--paper-deep),
      0 12px 24px var(--shadow-deep);
  }

  .specimen:hover::before {
    border-color: var(--moss);
  }

  .specimen .label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bark);
    margin-bottom: 18px;
    position: relative;
  }

  .specimen .label::before,
  .specimen .label::after {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--bark);
    vertical-align: middle;
    margin: 0 10px;
    opacity: 0.5;
  }

  .specimen .name-display {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    color: var(--moss-dark);
    line-height: 1.2;
    font-size: 30px;
    letter-spacing: -0.3px;
  }

  .specimen .first-name {
    display: block;
  }

  .specimen .middle-name {
    display: block;
    font-style: italic;
    color: var(--rosehip);
    font-weight: 400;
    margin: 4px 0;
  }

  .specimen .surname {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--bark);
    margin-top: 12px;
  }

  .specimen .pick-cta {
    margin-top: 24px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--moss);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .specimen:hover .pick-cta {
    opacity: 1;
  }

  /* Versus divider */
  .versus {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--bark);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    min-width: 60px;
    /* Align with the card area (excluding the eliminate button below) */
    min-height: 240px;
  }

  .versus svg {
    width: 32px;
    height: 80px;
    opacity: 0.6;
  }

  /* Action row */
  .action-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    padding: 14px 28px;
    border: 1px solid var(--moss);
    background: transparent;
    color: var(--moss-dark);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .btn:hover {
    background: var(--moss);
    color: var(--vellum);
  }

  .btn.primary {
    background: var(--moss-dark);
    color: var(--vellum);
    border-color: var(--moss-dark);
  }

  .btn.primary:hover {
    background: var(--ink);
    border-color: var(--ink);
  }

  .btn.danger {
    border-color: var(--rosehip);
    color: var(--rosehip-deep);
  }

  .btn.danger:hover {
    background: var(--rosehip);
    color: var(--vellum);
  }

  .btn.ghost {
    border-color: var(--paper-deep);
    color: var(--bark);
  }

  .btn.ghost:hover {
    border-color: var(--bark);
    background: var(--paper);
    color: var(--ink);
  }

  /* Footer link area */
  .footer-row {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--paper-deep);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--bark);
  }

  /* Rankings view */
  .rankings-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .rankings-header .eyebrow { margin-bottom: 8px; }
  .rankings-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 40px;
    color: var(--moss-dark);
    letter-spacing: -0.5px;
  }

  .rankings-header .latin {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--bark);
    margin-top: 6px;
  }

  .ranking-section {
    margin-bottom: 32px;
  }

  .section-heading {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--bark);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--paper-deep);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ranking-list {
    list-style: none;
  }

  .rank-item {
    display: grid;
    grid-template-columns: 50px 1fr auto auto;
    gap: 20px;
    align-items: baseline;
    padding: 14px 16px;
    border-bottom: 1px dotted var(--paper-deep);
    transition: background 0.15s ease;
  }

  .rank-item:hover {
    background: var(--paper);
  }

  .rank-item.top-three {
    background: linear-gradient(90deg, rgba(168, 136, 70, 0.1), transparent 60%);
  }

  .rank-item .position {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--moss);
    text-align: right;
  }

  .rank-item.top-three .position {
    color: var(--gold-leaf);
    font-weight: 600;
  }

  .rank-item .combo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--moss-dark);
    line-height: 1.3;
  }

  .rank-item .combo em {
    font-style: italic;
    color: var(--rosehip);
  }

  .rank-item .combo .surname-small {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--bark);
    margin-left: 8px;
    font-weight: 500;
  }

  .rank-item .rating {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--moss-dark);
    text-align: right;
    min-width: 56px;
  }

  .rank-item .record {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--bark);
    text-align: right;
    min-width: 80px;
  }

  .unseen-list {
    columns: 2;
    column-gap: 32px;
    list-style: none;
  }

  .unseen-list li {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--bark);
    padding: 4px 0;
    break-inside: avoid;
  }

  .unseen-list li em {
    font-style: italic;
  }

  .eliminated-list li {
    text-decoration: line-through;
    text-decoration-color: var(--rosehip);
    color: var(--bark);
    opacity: 0.65;
  }

  .eliminated-list li em {
    color: var(--rosehip);
  }

  .expand-toggle {
    text-align: center;
    margin: 24px 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--bark);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--moss-dark);
    color: var(--vellum);
    padding: 14px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    box-shadow: 0 8px 24px var(--shadow-deep);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
    border: 1px solid var(--moss);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Confirm dialog */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(31, 24, 16, 0.6);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-bg.show { display: flex; }

  .modal {
    background: var(--vellum);
    border: 1px solid var(--paper-deep);
    padding: 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 48px var(--shadow-deep);
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--paper-deep);
    pointer-events: none;
  }

  .modal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    color: var(--rosehip-deep);
    margin-bottom: 12px;
  }

  .modal p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--soil);
    margin-bottom: 24px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

  /* Responsive */
  @media (max-width: 720px) {
    .app { padding: 32px 16px 60px; }
    .masthead h1 { font-size: 36px; }
    .arena { grid-template-columns: 1fr; gap: 16px; }
    .versus { flex-direction: row; padding: 8px 0; min-width: 0; min-height: 0; }
    .versus svg { width: 80px; height: 24px; transform: rotate(90deg); }
    .specimen { padding: 28px 20px; min-height: auto; }
    .specimen .name-display { font-size: 26px; }
    .botanical-corner { width: 140px; height: 140px; opacity: 0.4; }
    .rank-item { grid-template-columns: 36px 1fr auto; gap: 12px; }
    .rank-item .record { display: none; }
    .rank-item .combo { font-size: 18px; }
    .unseen-list { columns: 1; }
    .stats { gap: 14px; font-size: 10px; }
  }
</style>
</head>
<body>

<!-- Botanical SVG decorations -->
<svg class="botanical-corner tl" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stem { fill: none; stroke: #4d5d36; stroke-width: 1.4; stroke-linecap: round; }
      .leaf { fill: #6b7d4a; }
      .leaf-light { fill: #9aab7d; }
      .berry { fill: #8a4a3c; }
      .berry-light { fill: #b8893d; }
    </style>
  </defs>
  <!-- Main vine -->
  <path class="stem" d="M 10 20 Q 50 40, 70 90 Q 85 140, 130 170 Q 170 195, 210 200" />
  <!-- Branches -->
  <path class="stem" d="M 35 35 Q 60 30, 80 50" />
  <path class="stem" d="M 70 90 Q 100 80, 120 100" />
  <path class="stem" d="M 100 130 Q 130 125, 150 145" />
  <path class="stem" d="M 50 60 Q 30 75, 25 100" />
  <!-- Leaves: ovate forms -->
  <ellipse class="leaf" cx="80" cy="48" rx="16" ry="6" transform="rotate(-25 80 48)" />
  <ellipse class="leaf-light" cx="78" cy="48" rx="13" ry="4" transform="rotate(-25 78 48)" />
  <ellipse class="leaf" cx="120" cy="100" rx="18" ry="7" transform="rotate(20 120 100)" />
  <ellipse class="leaf-light" cx="118" cy="98" rx="14" ry="5" transform="rotate(20 118 98)" />
  <ellipse class="leaf" cx="150" cy="148" rx="20" ry="8" transform="rotate(35 150 148)" />
  <ellipse class="leaf-light" cx="148" cy="146" rx="16" ry="5.5" transform="rotate(35 148 146)" />
  <ellipse class="leaf" cx="25" cy="105" rx="14" ry="6" transform="rotate(75 25 105)" />
  <ellipse class="leaf" cx="50" cy="65" rx="12" ry="5" transform="rotate(-50 50 65)" />
  <ellipse class="leaf-light" cx="60" cy="80" rx="10" ry="4" transform="rotate(-30 60 80)" />
  <ellipse class="leaf" cx="95" cy="115" rx="11" ry="5" transform="rotate(40 95 115)" />
  <!-- Berries -->
  <circle class="berry" cx="180" cy="185" r="4" />
  <circle class="berry" cx="188" cy="190" r="4" />
  <circle class="berry-light" cx="184" cy="195" r="3.5" />
  <circle class="berry" cx="42" cy="40" r="3" />
  <circle class="berry-light" cx="48" cy="35" r="2.5" />
  <!-- Small fern fronds -->
  <g transform="translate(20, 140) rotate(-15)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#4d5d36" stroke-width="1" />
    <line x1="0" y1="6" x2="-8" y2="2" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="14" x2="-10" y2="10" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="22" x2="-11" y2="18" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="30" x2="-9" y2="27" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="6" x2="8" y2="2" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="14" x2="10" y2="10" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="22" x2="11" y2="18" stroke="#6b7d4a" stroke-width="1" />
    <line x1="0" y1="30" x2="9" y2="27" stroke="#6b7d4a" stroke-width="1" />
  </g>
</svg>

<svg class="botanical-corner br" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stem2 { fill: none; stroke: #4d5d36; stroke-width: 1.4; stroke-linecap: round; }
      .leaf2 { fill: #6b7d4a; }
      .leaf2-light { fill: #9aab7d; }
      .berry2 { fill: #8a4a3c; }
    </style>
  </defs>
  <path class="stem2" d="M 10 20 Q 50 40, 70 90 Q 85 140, 130 170 Q 170 195, 210 200" />
  <path class="stem2" d="M 35 35 Q 60 30, 80 50" />
  <path class="stem2" d="M 70 90 Q 100 80, 120 100" />
  <path class="stem2" d="M 100 130 Q 130 125, 150 145" />
  <ellipse class="leaf2" cx="80" cy="48" rx="16" ry="6" transform="rotate(-25 80 48)" />
  <ellipse class="leaf2-light" cx="78" cy="48" rx="13" ry="4" transform="rotate(-25 78 48)" />
  <ellipse class="leaf2" cx="120" cy="100" rx="18" ry="7" transform="rotate(20 120 100)" />
  <ellipse class="leaf2-light" cx="118" cy="98" rx="14" ry="5" transform="rotate(20 118 98)" />
  <ellipse class="leaf2" cx="150" cy="148" rx="20" ry="8" transform="rotate(35 150 148)" />
  <circle class="berry2" cx="180" cy="185" r="4" />
  <circle class="berry2" cx="188" cy="190" r="4" />
</svg>

<div class="app">
  <div id="screen"></div>
</div>

<div id="toast" class="toast"></div>

<div id="modal" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Reset everything?</h3>
    <p id="modal-text">All comparisons and ratings will be lost. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn danger" id="modal-confirm">Yes, reset</button>
    </div>
  </div>
</div>

<script>
// ============== DATA ==============
const FIRST_NAMES = [
  "Beatrix","Elizabeth","Emily","Sophie","Grace","Imogen","Lucy","Meredith"
];

const MIDDLE_NAMES = [
  "Grace","Joy","Elizabeth","Meredith","Adelaide","Rose"
];

const SURNAME = "Morton";
const STORAGE_KEY = "morton_elo_v4";
const K_FACTOR = 32;
const INITIAL_RATING = 1200;

// Build all valid combinations — only rule is no duplicates (e.g. Grace Grace)
function buildCombos() {
  const combos = [];
  for (const f of FIRST_NAMES) {
    for (const m of MIDDLE_NAMES) {
      if (f === m) continue;
      combos.push({ first: f, middle: m, id: `${f}|${m}` });
    }
  }
  return combos;
}

const ALL_COMBOS = buildCombos();
const TOTAL_COMBOS = ALL_COMBOS.length;

// ============== STATE ==============
let state = {
  ratings: {},        // id -> rating
  wins: {},           // id -> count
  losses: {},         // id -> count
  skips: {},          // id -> count
  shown: {},          // id -> times shown in a matchup
  pairsSeen: {},      // "id1::id2" (sorted) -> true
  eliminated: {},     // id -> true (combo removed from active pool)
  totalMatches: 0,
  currentPair: null   // [comboA, comboB]
};

let view = 'match';   // 'match' | 'rankings'
let rankingsExpanded = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...state, ...parsed };
      // Repair any missing fields
      if (!state.ratings) state.ratings = {};
      if (!state.wins) state.wins = {};
      if (!state.losses) state.losses = {};
      if (!state.skips) state.skips = {};
      if (!state.shown) state.shown = {};
      if (!state.pairsSeen) state.pairsSeen = {};
      if (!state.eliminated) state.eliminated = {};
      if (typeof state.totalMatches !== 'number') state.totalMatches = 0;
      state.currentPair = null; // always pick a fresh pair on load
    }
  } catch (e) {
    console.warn("Failed to load state", e);
  }
}

function saveState() {
  try {
    const toSave = { ...state };
    delete toSave.currentPair;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    console.warn("Failed to save state", e);
  }
}

function getRating(id) {
  return state.ratings[id] !== undefined ? state.ratings[id] : INITIAL_RATING;
}

function pairKey(idA, idB) {
  return [idA, idB].sort().join('::');
}

// ============== PAIR SELECTION ==============
function pickNextPair() {
  // Filter out eliminated combos from the active pool
  const ACTIVE = ALL_COMBOS.filter(c => !state.eliminated[c.id]);

  // Edge case: fewer than 2 active combos — no matchup possible
  if (ACTIVE.length < 2) return null;

  // Calculate total possible pairs among active combos only
  const totalPossiblePairs = (ACTIVE.length * (ACTIVE.length - 1)) / 2;
  // Count seen pairs that involve only active combos (eliminated combos may
  // have left orphan pair entries, which we ignore)
  let seenActivePairCount = 0;
  for (const key in state.pairsSeen) {
    const [idA, idB] = key.split('::');
    if (!state.eliminated[idA] && !state.eliminated[idB]) {
      seenActivePairCount++;
    }
  }

  if (seenActivePairCount < totalPossiblePairs) {
    // There's still at least one unseen pair among active combos
    const sortedByShown = [...ACTIVE].sort((a, b) => {
      const sa = state.shown[a.id] || 0;
      const sb = state.shown[b.id] || 0;
      if (sa !== sb) return sa - sb;
      return Math.random() - 0.5;
    });

    for (const anchor of sortedByShown) {
      const candidates = ACTIVE.filter(c => {
        if (c.id === anchor.id) return false;
        return !state.pairsSeen[pairKey(anchor.id, c.id)];
      });
      if (candidates.length > 0) {
        candidates.sort((a, b) => {
          const sa = state.shown[a.id] || 0;
          const sb = state.shown[b.id] || 0;
          if (sa !== sb) return sa - sb;
          return Math.random() - 0.5;
        });
        const minShown = state.shown[candidates[0].id] || 0;
        const lowestTier = candidates.filter(c => (state.shown[c.id] || 0) === minShown);
        const partner = lowestTier[Math.floor(Math.random() * lowestTier.length)];
        return Math.random() < 0.5 ? [anchor, partner] : [partner, anchor];
      }
    }
  }

  // Phase 2: ELO-style — pair combos with similar ratings (active only)
  const shuffled = [...ACTIVE].sort(() => Math.random() - 0.5);
  for (const a of shuffled) {
    const ratingA = getRating(a.id);
    const others = ACTIVE
      .filter(c => c.id !== a.id)
      .map(c => ({ combo: c, diff: Math.abs(getRating(c.id) - ratingA) }))
      .sort((x, y) => x.diff - y.diff);

    if (others.length === 0) continue;
    const topPool = others.slice(0, 5);
    const chosen = topPool[Math.floor(Math.random() * topPool.length)].combo;
    return Math.random() < 0.5 ? [a, chosen] : [chosen, a];
  }

  // Fallback (shouldn't happen)
  const ACTIVE_FALLBACK = ALL_COMBOS.filter(c => !state.eliminated[c.id]);
  if (ACTIVE_FALLBACK.length < 2) return null;
  const a = ACTIVE_FALLBACK[Math.floor(Math.random() * ACTIVE_FALLBACK.length)];
  let b = ACTIVE_FALLBACK[Math.floor(Math.random() * ACTIVE_FALLBACK.length)];
  while (b.id === a.id) {
    b = ACTIVE_FALLBACK[Math.floor(Math.random() * ACTIVE_FALLBACK.length)];
  }
  return [a, b];
}

function ensureCurrentPair() {
  if (!state.currentPair) {
    state.currentPair = pickNextPair();
  }
}

// ============== ELO CALCULATION ==============
function expectedScore(ratingA, ratingB) {
  return 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400));
}

function applyResult(winnerId, loserId) {
  const rW = getRating(winnerId);
  const rL = getRating(loserId);
  const expW = expectedScore(rW, rL);
  const expL = 1 - expW;
  state.ratings[winnerId] = Math.round((rW + K_FACTOR * (1 - expW)) * 100) / 100;
  state.ratings[loserId] = Math.round((rL + K_FACTOR * (0 - expL)) * 100) / 100;
}

// ============== ACTIONS ==============
function pick(winnerIndex) {
  const [a, b] = state.currentPair;
  const winner = winnerIndex === 0 ? a : b;
  const loser = winnerIndex === 0 ? b : a;

  applyResult(winner.id, loser.id);
  state.wins[winner.id] = (state.wins[winner.id] || 0) + 1;
  state.losses[loser.id] = (state.losses[loser.id] || 0) + 1;
  state.shown[a.id] = (state.shown[a.id] || 0) + 1;
  state.shown[b.id] = (state.shown[b.id] || 0) + 1;
  state.pairsSeen[pairKey(a.id, b.id)] = true;
  state.totalMatches++;
  state.currentPair = pickNextPair();
  saveState();
  render();
}

function skip() {
  const [a, b] = state.currentPair;
  state.skips[a.id] = (state.skips[a.id] || 0) + 1;
  state.skips[b.id] = (state.skips[b.id] || 0) + 1;
  state.shown[a.id] = (state.shown[a.id] || 0) + 1;
  state.shown[b.id] = (state.shown[b.id] || 0) + 1;
  state.pairsSeen[pairKey(a.id, b.id)] = true;
  state.totalMatches++;
  state.currentPair = pickNextPair();
  saveState();
  render();
}

function eliminate(index) {
  // index 0 = left, 1 = right. Mark that combo as eliminated and pick a new pair.
  // The other combo is unaffected — no rating change, no skip count, no pair counted as seen.
  const combo = state.currentPair[index];
  state.eliminated[combo.id] = true;
  // Wipe the rating so it shows as null in exports; preserve win/loss history for context if needed,
  // but per spec the export only shows "eliminated" status so these won't appear.
  delete state.ratings[combo.id];
  state.currentPair = pickNextPair();
  saveState();
  render();
}

function showRankings() {
  view = 'rankings';
  render();
}

function returnToRanking() {
  view = 'match';
  ensureCurrentPair();
  render();
}

function resetAll() {
  state = {
    ratings: {}, wins: {}, losses: {}, skips: {}, shown: {},
    pairsSeen: {}, eliminated: {}, totalMatches: 0, currentPair: null
  };
  rankingsExpanded = false;
  saveState();
  ensureCurrentPair();
  view = 'match';
  render();
}

function openResetModal() {
  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = 'Reset everything?';
  document.getElementById('modal-text').textContent = 'All comparisons and ratings will be lost. This cannot be undone.';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Yes, reset';
  btn.onclick = () => { closeModal(); resetAll(); };
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ============== EXPORT ==============
function exportToClipboard() {
  // Build sorted lists: seen (by rating desc), unseen (alphabetical), eliminated (alphabetical)
  const seen = [];
  const unseen = [];
  const eliminatedRows = [];
  for (const c of ALL_COMBOS) {
    if (state.eliminated[c.id]) {
      eliminatedRows.push({
        first: c.first,
        middle: c.middle,
        full: `${c.first} ${c.middle} ${SURNAME}`
      });
      continue;
    }
    const wasShown = (state.shown[c.id] || 0) > 0;
    const row = {
      first: c.first,
      middle: c.middle,
      full: `${c.first} ${c.middle} ${SURNAME}`,
      rating: getRating(c.id),
      wins: state.wins[c.id] || 0,
      losses: state.losses[c.id] || 0,
      skips: state.skips[c.id] || 0,
      shown: state.shown[c.id] || 0,
      wasShown
    };
    if (wasShown) seen.push(row); else unseen.push(row);
  }
  seen.sort((a, b) => b.rating - a.rating);
  const alphaSort = (a, b) => {
    if (a.first !== b.first) return a.first.localeCompare(b.first);
    return a.middle.localeCompare(b.middle);
  };
  unseen.sort(alphaSort);
  eliminatedRows.sort(alphaSort);

  const headers = ['Rank', 'First Name', 'Middle Name', 'Full Name', 'Rating', 'Wins', 'Losses', 'Skips', 'Times Shown'];
  const rows = [headers.join('\t')];
  let rank = 1;
  for (const r of seen) {
    rows.push([rank, r.first, r.middle, r.full, r.rating.toFixed(2), r.wins, r.losses, r.skips, r.shown].join('\t'));
    rank++;
  }
  for (const r of unseen) {
    rows.push(['—', r.first, r.middle, r.full, r.rating.toFixed(2), r.wins, r.losses, r.skips, r.shown].join('\t'));
  }
  for (const r of eliminatedRows) {
    // Eliminated rows: only show name and "eliminated" status; other columns blank
    rows.push(['eliminated', r.first, r.middle, r.full, '', '', '', '', ''].join('\t'));
  }
  const text = rows.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    showToast('✦ Rankings copied to clipboard');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✦ Rankings copied to clipboard');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============== RENDER ==============
function comboHtml(combo) {
  return `<span class="first-name">${combo.first}</span>` +
         `<span class="middle-name">${combo.middle}</span>` +
         `<span class="surname">${SURNAME}</span>`;
}

function comboInline(combo, isRank) {
  if (isRank) {
    return `${combo.first} <em>${combo.middle}</em><span class="surname-small">${SURNAME}</span>`;
  }
  return `${combo.first} ${combo.middle} ${SURNAME}`;
}

function render() {
  const screen = document.getElementById('screen');
  if (view === 'match') {
    renderMatch(screen);
  } else {
    renderRankings(screen);
  }
}

function renderMatch(screen) {
  ensureCurrentPair();
  const [a, b] = state.currentPair;

  // Guard: if pickNextPair returned null (too few active combos), show a message
  if (!state.currentPair) {
    const eliminatedCount = Object.keys(state.eliminated).length;
    screen.innerHTML = `
      <header class="masthead fade-in">
        <div class="eyebrow">A study in pairings</div>
        <h1>Morton <em>name sorting</em></h1>
        <div class="latin">No more matchups available</div>
      </header>

      <div class="dialog-box-equivalent fade-in" style="background: var(--vellum); border: 1px solid var(--paper-deep); padding: 36px; text-align: center; box-shadow: 0 6px 12px var(--shadow); margin: 32px auto; max-width: 540px;">
        <p style="font-family: 'Fraunces', serif; font-size: 22px; color: var(--moss-dark); margin-bottom: 12px;">The herbarium is empty.</p>
        <p style="color: var(--bark); font-size: 16px; line-height: 1.6;">
          ${eliminatedCount} combinations have been eliminated, leaving fewer than two active. View your rankings or reset to start again.
        </p>
      </div>

      <div class="action-row fade-in">
        <button class="btn primary" onclick="showRankings()">View rankings</button>
        <button class="btn danger" onclick="openResetModal()">Reset all data</button>
      </div>
    `;
    return;
  }

  const seenPairs = Object.keys(state.pairsSeen).length;
  const totalPairs = (TOTAL_COMBOS * (TOTAL_COMBOS - 1)) / 2;
  const seenCombos = Object.keys(state.shown).filter(k => state.shown[k] > 0).length;
  const eliminatedCount = Object.keys(state.eliminated).length;

  screen.innerHTML = `
    <header class="masthead fade-in">
      <div class="eyebrow">A study in pairings</div>
      <h1>Morton <em>name sorting</em></h1>
      <div class="latin">Choose the combination that pleases you more</div>
    </header>

    <div class="stats fade-in">
      <div class="stat"><span class="num">${state.totalMatches}</span><span>comparisons</span></div>
      <div class="stat-divider"></div>
      <div class="stat"><span class="num">${seenCombos}</span><span>of ${TOTAL_COMBOS - eliminatedCount} combos seen</span></div>
      ${eliminatedCount > 0 ? `
        <div class="stat-divider"></div>
        <div class="stat"><span class="num">${eliminatedCount}</span><span>eliminated</span></div>
      ` : ''}
    </div>

    <div class="arena fade-in">
      <div class="arena-col">
        <div class="specimen" onclick="pick(0)">
          <div class="label">Option I</div>
          <div class="name-display">${comboHtml(a)}</div>
          <div class="pick-cta">↑ Choose this one ↑</div>
        </div>
        <button class="btn-eliminate" onclick="eliminate(0)" title="Remove this combination from ranking">
          ✕ Eliminate
        </button>
      </div>

      <div class="versus">
        <svg viewBox="0 0 32 80" xmlns="http://www.w3.org/2000/svg">
          <line x1="16" y1="2" x2="16" y2="34" stroke="#6b5340" stroke-width="1" stroke-linecap="round" />
          <text x="16" y="46" text-anchor="middle" font-family="Cormorant Garamond" font-style="italic" font-size="14" fill="#6b5340">vs</text>
          <line x1="16" y1="54" x2="16" y2="78" stroke="#6b5340" stroke-width="1" stroke-linecap="round" />
        </svg>
      </div>

      <div class="arena-col">
        <div class="specimen" onclick="pick(1)">
          <div class="label">Option II</div>
          <div class="name-display">${comboHtml(b)}</div>
          <div class="pick-cta">↑ Choose this one ↑</div>
        </div>
        <button class="btn-eliminate" onclick="eliminate(1)" title="Remove this combination from ranking">
          ✕ Eliminate
        </button>
      </div>
    </div>

    <div class="action-row fade-in">
      <button class="btn ghost" onclick="skip()">↷ Skip this pair</button>
      <button class="btn primary" onclick="showRankings()">View rankings</button>
    </div>

    <div class="footer-row">
      ${state.totalMatches === 0 ? 'Begin by choosing a name above.' : `${seenPairs < totalPairs ? 'Still discovering new pairings…' : 'Now refining the rankings.'}`}
      <br><br>
      <button class="btn danger" onclick="openResetModal()" style="font-size: 10px; padding: 8px 16px;">Reset all data</button>
    </div>
  `;
}

function renderRankings(screen) {
  // Build sorted lists; eliminated combos go in their own bucket
  const seen = [];
  const unseen = [];
  const eliminatedList = [];
  for (const c of ALL_COMBOS) {
    if (state.eliminated[c.id]) {
      eliminatedList.push(c);
    } else if ((state.shown[c.id] || 0) > 0) {
      seen.push(c);
    } else {
      unseen.push(c);
    }
  }
  seen.sort((a, b) => getRating(b.id) - getRating(a.id));
  const alphaSort = (a, b) => {
    if (a.first !== b.first) return a.first.localeCompare(b.first);
    return a.middle.localeCompare(b.middle);
  };
  unseen.sort(alphaSort);
  eliminatedList.sort(alphaSort);

  const top10 = seen.slice(0, 10);
  const restSeen = seen.slice(10);

  const top10Html = top10.length === 0
    ? `<div class="empty-state">No combinations have been compared yet.<br>Return to ranking to begin.</div>`
    : `<ol class="ranking-list">
        ${top10.map((c, i) => `
          <li class="rank-item ${i < 3 ? 'top-three' : ''}">
            <div class="position">${i + 1}</div>
            <div class="combo">${comboInline(c, true)}</div>
            <div class="rating">${getRating(c.id).toFixed(0)}</div>
            <div class="record">${state.wins[c.id] || 0}W · ${state.losses[c.id] || 0}L</div>
          </li>
        `).join('')}
      </ol>`;

  let expandedHtml = '';
  if (rankingsExpanded) {
    if (restSeen.length > 0) {
      expandedHtml += `
        <div class="ranking-section">
          <div class="section-heading"><span>The remainder, ranked</span><span>${restSeen.length} combinations</span></div>
          <ol class="ranking-list" start="11">
            ${restSeen.map((c, i) => `
              <li class="rank-item">
                <div class="position">${i + 11}</div>
                <div class="combo">${comboInline(c, true)}</div>
                <div class="rating">${getRating(c.id).toFixed(0)}</div>
                <div class="record">${state.wins[c.id] || 0}W · ${state.losses[c.id] || 0}L</div>
              </li>
            `).join('')}
          </ol>
        </div>
      `;
    }
    if (unseen.length > 0) {
      expandedHtml += `
        <div class="ranking-section">
          <div class="section-heading"><span>Awaiting comparison</span><span>${unseen.length} combinations</span></div>
          <ul class="unseen-list">
            ${unseen.map(c => `<li>${c.first} <em>${c.middle}</em></li>`).join('')}
          </ul>
        </div>
      `;
    }
    if (eliminatedList.length > 0) {
      expandedHtml += `
        <div class="ranking-section">
          <div class="section-heading"><span>Eliminated</span><span>${eliminatedList.length} combinations</span></div>
          <ul class="unseen-list eliminated-list">
            ${eliminatedList.map(c => `<li>${c.first} <em>${c.middle}</em></li>`).join('')}
          </ul>
        </div>
      `;
    }
  }

  screen.innerHTML = `
    <header class="masthead fade-in">
      <div class="eyebrow">Current standings</div>
      <h1>The <em>top ten</em></h1>
      <div class="latin">${state.totalMatches} comparisons made · ${seen.length} of ${TOTAL_COMBOS - eliminatedList.length} active combinations rated${eliminatedList.length > 0 ? ` · ${eliminatedList.length} eliminated` : ''}</div>
    </header>

    <div class="ranking-section fade-in">
      <div class="section-heading"><span>Top ten</span><span>by rating</span></div>
      ${top10Html}
    </div>

    <div class="expand-toggle">
      <button class="btn ghost" onclick="toggleExpand()">
        ${rankingsExpanded ? '▲ Show top ten only' : '▼ Show all combinations'}
      </button>
    </div>

    ${expandedHtml}

    <div class="action-row fade-in" style="margin-top: 32px;">
      <button class="btn primary" onclick="returnToRanking()">↩ Return to ranking</button>
      <button class="btn" onclick="exportToClipboard()">⎘ Export rankings</button>
      <button class="btn danger" onclick="openResetModal()">Reset all</button>
    </div>
  `;
}

function toggleExpand() {
  rankingsExpanded = !rankingsExpanded;
  render();
}

// ============== INIT ==============
loadState();
ensureCurrentPair();
render();

// Keyboard shortcuts: 1 = pick left, 2 = pick right, S = skip, R = rankings
document.addEventListener('keydown', (e) => {
  if (document.getElementById('modal').classList.contains('show')) return;
  if (view === 'match') {
    if (e.key === '1' || e.key === 'ArrowLeft') pick(0);
    else if (e.key === '2' || e.key === 'ArrowRight') pick(1);
    else if (e.key.toLowerCase() === 's') skip();
    else if (e.key.toLowerCase() === 'r') showRankings();
  } else {
    if (e.key === 'Escape' || e.key.toLowerCase() === 'r') returnToRanking();
  }
});
</script>
</body>
</html>
